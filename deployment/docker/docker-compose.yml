services:
  frontend:
    build:
      context: ../../frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

  backend:
    build:
      context: ../../backend
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=local
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=devpassword
      - DB_NAME=portfolio
      - DB_SEED_DATA=true
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=devpassword
      - ADMIN_SESSION_SECRET=dev-session-secret-change-in-prod
      - GCS_BUCKET=hark-portfolio-images
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=devpassword
      - MYSQL_DATABASE=portfolio
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdevpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
